<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Профиль продавца | Build_Auction</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>
<header>
    <h1>🔨 Build_Auction</h1>
    <nav id="main-nav" style="display: flex; gap: 10px;">
        <button onclick="window.location.href='index.html'">🏠 На главную</button>
    </nav>
</header>

<main style="max-width: 1000px; margin: 0 auto;">
    <div style="background: var(--card-bg); padding: 30px; border-radius: 12px; border: 1px solid var(--border-color); margin-bottom: 30px; text-align: center;">
        <div style="width: 80px; height: 80px; border-radius: 50%; background: var(--ebay-blue); color: white; display: flex; align-items: center; justify-content: center; font-size: 35px; margin: 0 auto 15px;">👤</div>
        <h2 id="seller-name" style="color: var(--text-heading);">Загрузка...</h2>
        <p style="color: var(--text-muted);">Проверенный продавец Build_Auction</p>
    </div>

    <h2 style="font-size: 20px; margin-bottom: 20px;">Все лоты этого продавца:</h2>
    <div id="seller-lots-container" class="lots-grid"></div>
</main>

<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
<script src="app.js"></script>
</body>
</html>
