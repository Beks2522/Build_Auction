<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <title>Мои сообщения | Build_Auction</title>
    <link rel="stylesheet" href="style.css">
</head>
<body class="dark-theme">
<header class="mangalib-header">
    <div class="header-left">
        <h1 style="cursor: pointer; margin: 0; font-size: 24px; color: var(--text-heading);" onclick="window.location.href='index.html'">Build_Auction</h1>
        
        <nav id="main-nav" class="desktop-nav" style="display: none;">
            <a href="index.html">Главная</a>
            <a href="create.html">Каталог (Лоты)</a>
            <a href="messages.html" id="nav-messages-btn" style="display: none;">Чат</a>
            <a href="profile.html">Профиль</a>
        </nav>
    </div>

    <div class="header-right">
        <button class="icon-btn" onclick="toggleSearchModal()">🔎</button>
        <button class="icon-btn" onclick="toggleTheme()" id="theme-btn">🌙</button>
        
        <div id="guest-info">
            <button onclick="showAuthModal()" class="auth-btn-small">Войти</button>
        </div>
        
        <div id="user-info" style="display: none; cursor: pointer;" onclick="window.location.href='profile.html'">
             <img id="user-avatar" src="https://placehold.co/40x40?text=👤" class="header-avatar">
        </div>
    </div>
</header>

<div id="search-overlay" class="search-overlay" onclick="toggleSearchModal()"></div>
<div id="mangalib-search-modal" class="search-popover-centered">
    <div class="search-input-wrapper">
        <span style="color: var(--text-muted);">🔍</span>
        <input type="text" id="search-input" placeholder="Что ищем?">
        <button onclick="toggleSearchModal()" class="close-search-btn">✖</button>
    </div>
    
    <select id="category-filter" style="display: none;">
        <option value="all">Все</option>
        <option value="electronics">Электроника</option>
        <option value="auto">Авто</option>
        <option value="home">Для дома</option>
        <option value="clothing">Одежда</option>
        <option value="other">Разное</option>
    </select>
    <select id="sort-filter" style="display: none;"><option value="newest"></option></select>
    
    <div class="search-filters">
        <button class="filter-pill active" onclick="setCategory('all', this)">Все категории</button>
        <button class="filter-pill" onclick="setCategory('electronics', this)">Электроника</button>
        <button class="filter-pill" onclick="setCategory('auto', this)">Авто</button>
    </div>

    <div class="search-popular">
        <h4 style="margin: 0 0 10px 0; color: var(--text-muted); font-size: 13px;">Что ищут</h4>
        <div class="popular-tags">
            <span onclick="document.getElementById('search-input').value='Porsche 718';">Porsche 718</span>
            <span onclick="document.getElementById('search-input').value='Изумрудный Тарик';">Изумрудный Тарик</span>
        </div>
    </div>
    
    <button id="search-btn" class="auth-btn-small" style="width: 100%; margin-top: 20px; padding: 12px; font-size: 16px;">Найти</button>
</div>

    <div class="container" style="display: flex; height: 80vh; margin-top: 20px; gap: 20px;">
        <div id="inbox-list" style="width: 300px; background: var(--card-bg); border-radius: 12px; overflow-y: auto; border: 1px solid var(--border-color);">
            <h2 style="padding: 15px; border-bottom: 1px solid var(--border-color);">Чаты</h2>
            <div id="conversations-container">
                <p style="padding: 20px; color: var(--text-muted);">Загрузка диалогов...</p>
            </div>
        </div>

        <div id="active-chat-window" style="flex-grow: 1; background: var(--card-bg); border-radius: 12px; display: flex; flex-direction: column; border: 1px solid var(--border-color); position: relative;">
            <div id="chat-not-selected" style="margin: auto; text-align: center; color: var(--text-muted);">
                <h3>Выберите чат, чтобы начать общение</h3>
            </div>
            
            <div id="chat-content" style="display: none; flex-direction: column; height: 100%;">
                <div id="active-chat-header" style="padding: 15px; background: var(--ebay-blue); color: white; border-radius: 12px 12px 0 0;">
                    <h3 id="active-partner-name" style="margin:0;">Чат</h3>
                </div>
                <div id="chat-messages" style="flex-grow: 1; overflow-y: auto; padding: 20px; background: #e5ddd5; display: flex; flex-direction: column; gap: 10px;"></div>
                <div style="padding: 15px; display: flex; gap: 10px;">
                    <input type="text" id="chat-input" placeholder="Введите сообщение..." style="flex-grow: 1; padding: 10px; border-radius: 20px; border: 1px solid var(--border-color);">
                    <button onclick="sendMessage()" style="border-radius: 50%; width: 45px; height: 45px;">➤</button>
                </div>
            </div>
        </div>
    </div>

    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
    <script src="app.js"></script>
    <script src="chat.js"></script>
    <script>
        // Специальная логика только для этой страницы
        window.addEventListener('load', async () => {
            // Ждем авторизации
            setTimeout(loadInbox, 1000);
        });

async function loadInbox() {
            if (!currentSession) return;
            try {
                const res = await fetch(`${API_URL}/my/conversations`, {
                    headers: { 'Authorization': `Bearer ${currentSession.access_token}` }
                });
                const convs = await res.json();
                
                const container = document.getElementById('conversations-container');
                container.innerHTML = '';

                if (convs.error) {
                    container.innerHTML = `<p style="padding: 20px; color: #e74c3c; font-weight: bold;">Ошибка: ${convs.error}</p>`;
                    return;
                }

                if (!Array.isArray(convs) || convs.length === 0) {
                    container.innerHTML = '<p style="padding: 20px; color: var(--text-muted);">У вас пока нет сообщений.</p>';
                    return;
                }

                convs.forEach(c => {
                    const item = document.createElement('div');
                    item.style = "padding: 15px; border-bottom: 1px solid var(--border-color); cursor: pointer; transition: 0.2s;";
                    item.className = "inbox-item";
                    item.innerHTML = `
                        <div style="font-weight: bold;">${c.lotTitle || 'Чат по лоту'}</div>
                        <div style="font-size: 12px; color: var(--text-muted);">Нажмите, чтобы открыть</div>
                    `;
                    item.onclick = () => selectChat(c.lotId, c.partnerId, c.lotTitle || 'Чат');
                    container.appendChild(item);
                });
            } catch (e) { 
                console.error("Сбой в скрипте:", e); 
            }
        } 

        
        function selectChat(lotId, partnerId, title) {
            // Прячем заглушку "Выберите чат"
            document.getElementById('chat-not-selected').style.display = 'none';
            // Показываем само окно переписки
            document.getElementById('chat-content').style.display = 'flex';
            
            // Вызываем главную функцию чата (из твоего файла chat.js)
            openChat(lotId, partnerId, title);
        }
    </script>
</body>
</html>
