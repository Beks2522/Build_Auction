<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Build_Auction</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>

<header>
    <h1>🔨 Build_Auction</h1>
    <div style="display: flex; align-items: center; gap: 20px;">
        <button onclick="toggleTheme()" id="theme-btn" style="background: none; border: none; box-shadow: none; font-size: 24px; padding: 0; cursor: pointer; transform: none;">🌙</button>
<nav id="main-nav" style="display: none; gap: 10px;">
            <button onclick="window.location.href='index.html'">🏠 Главная</button>
            <button onclick="window.location.href='create.html'">➕ Создать лот</button>
            
            <button id="nav-messages-btn" onclick="window.location.href='messages.html'" style="display: none;">💬 Сообщения</button>
            
            <button onclick="window.location.href='profile.html'">👤 Профиль</button>
        </nav>

        <div id="guest-info">
            <button onclick="showAuthModal()" style="background: #2c3e50; padding: 8px 20px;">Войти</button>
        </div>

    </div>
</header>

<main>
    <section class="ebay-search-container">
        
        <div class="search-box-wrapper">
            <span class="search-icon">🔍</span>
            <input type="text" id="search-input" placeholder="Найдите любые товары">
            
            <div class="divider"></div>
            
            <select id="category-filter">
                <option value="all">Все категории</option>
                <option value="electronics">Электроника</option>
                <option value="auto">Авто и мото</option>
                <option value="home">Для дома</option>
                <option value="clothing">Одежда и обувь</option>
                <option value="other">Разное</option>
            </select>

            <div class="divider"></div>
            
            <select id="sort-filter" style="font-weight: 500; color: var(--ebay-blue);">
                <option value="newest"> Сначала новые</option>
                <option value="ending_soon"> Заканчиваются скоро</option>
                <option value="price_asc"> Сначала дешевые</option>
                <option value="price_desc"> Сначала дорогие</option>
            </select>
        </div>
        
        <button id="search-btn" class="ebay-search-btn">Найти</button>

    </section>
        </div>

    </section>

    <section class="lots-section">
        <h2>Активные лоты</h2>
        <div id="lots-container" class="lots-grid"></div>
    </section>
</main>

<div id="auth-modal" style="display: none; position: fixed; z-index: 9999; left: 0; top: 0; width: 100%; height: 100%; background-color: rgba(10, 10, 20, 0.85); backdrop-filter: blur(8px);">
    <div style="background: linear-gradient(145deg, #1e1e30, #141420); color: white; margin: 10% auto; padding: 40px; border-radius: 12px; width: 90%; max-width: 450px; position: relative; box-shadow: 0 15px 40px rgba(0,0,0,0.6); border: 1px solid #2a2a40;">
        
        <span onclick="closeAuthModal()" style="color: #666; position: absolute; top: 15px; right: 20px; font-size: 28px; font-weight: bold; cursor: pointer; transition: 0.3s;">&times;</span>
        
        <h2 style="text-align: center; margin-top: 0; color: #fff; font-size: 24px;">ВХОД В СИСТЕМУ</h2>
        <p style="text-align: center; font-size: 14px; color: #888; margin-bottom: 30px;">Пожалуйста, создайте аккаунт или войдите, чтобы делать ставки.</p>
        
        <input type="text" id="username" placeholder="Имя (только для регистрации)" style="background: #11111a; color: white; border: 1px solid #2a2a40; padding: 15px;">
        <input type="email" id="email" placeholder="Email" required style="background: #11111a; color: white; border: 1px solid #2a2a40; padding: 15px;">
        <input type="password" id="password" placeholder="Пароль" required style="background: #11111a; color: white; border: 1px solid #2a2a40; padding: 15px;">
        
        <div style="display: flex; gap: 15px; margin-top: 25px;">
            <button onclick="login()" style="flex: 1; background: #4a4e69; padding: 15px; border-radius: 8px;">ВОЙТИ</button>
            <button onclick="register()" style="flex: 1; background: #5c3c92; padding: 15px; border-radius: 8px;">СОЗДАТЬ</button>
        </div>
    </div>
</div>

<div id="bids-modal" style="display: none; position: fixed; z-index: 1000; left: 0; top: 0; width: 100%; height: 100%; background-color: rgba(0,0,0,0.5);">
    <div style="background-color: #fefefe; margin: 10% auto; padding: 20px; border-radius: 8px; width: 90%; max-width: 500px;">
        <span onclick="closeBidsModal()" style="color: #aaa; float: right; font-size: 28px; font-weight: bold; cursor: pointer;">&times;</span>
        <h2>📜 История ставок</h2>
        <div id="bids-list"></div>
    </div>
</div>
<div id="chat-modal" style="display: none; position: fixed; bottom: 20px; right: 20px; width: 350px; background: var(--card-bg); border-radius: 12px; box-shadow: 0 5px 25px rgba(0,0,0,0.3); z-index: 9999; border: 1px solid var(--border-color); overflow: hidden;">
        <div style="background: var(--ebay-blue); color: white; padding: 15px; display: flex; justify-content: space-between; align-items: center;">
            <h3 id="chat-title" style="margin: 0; font-size: 16px;">💬 Чат</h3>
            <button onclick="closeChat()" style="background: none; border: none; color: white; font-size: 24px; cursor: pointer; padding: 0; line-height: 1;">&times;</button>
        </div>
        <div id="chat-messages" style="height: 350px; overflow-y: auto; padding: 15px; display: flex; flex-direction: column; gap: 10px; background: #e5ddd5;">
            </div>
        <div style="padding: 10px; border-top: 1px solid var(--border-color); display: flex; gap: 10px; background: var(--card-bg);">
            <input type="text" id="chat-input" placeholder="Сообщение..." style="flex-grow: 1; padding: 10px 15px; border-radius: 20px; border: 1px solid #ccc; outline: none; font-family: inherit;">
            <button onclick="sendMessage()" style="background: #27ae60; color: white; border: none; border-radius: 50%; width: 40px; height: 40px; cursor: pointer; display: flex; align-items: center; justify-content: center; font-size: 18px;">➤</button>
        </div>
    </div>

<div id="toast-container"></div>
<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
<script src="app.js"></script>
<script src="chat.js"></script>
</body>
</html>
