<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Создать лот | Аукцион</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>

<header class="mangalib-header">
        <div class="header-left">
            <button class="mobile-menu-btn" onclick="openSidebar()">☰</button>
            <h1 style="cursor: pointer; margin: 0; font-size: 24px; color: var(--text-heading);" onclick="window.location.href='index.html'">Build Auction</h1>
            
            <nav id="main-nav" class="desktop-nav" style="display: none;">
                <a href="index.html">Главная</a>
                <a href="create.html" class="active" onclick="requireAuth(event, 'create.html')">Создать лот</a>
                <a href="messages.html" id="nav-messages-btn" style="display: none;" onclick="requireAuth(event, 'messages.html')">Чат</a>
            </nav>
        </div>

    <div class="header-right">
        <button class="icon-btn" onclick="toggleSearchModal()">🔎</button>
        <button class="icon-btn" onclick="toggleTheme()" id="theme-btn">🌙</button>
        
        <div id="guest-info">
            <button onclick="showAuthModal()" class="auth-btn-small">Войти</button>
        </div>
        
        <div id="user-info" style="display: none; cursor: pointer;" onclick="window.location.href='profile.html'">
             <img id="user-avatar" src="https://placehold.co/40x40?text=👤" class="header-avatar">
        </div>
    </div>
</header>

<div id="sidebar-overlay" class="sidebar-overlay" onclick="closeSidebar()"></div>

<div id="mobile-sidebar" class="mobile-sidebar">
    <div class="sidebar-header">
        <span style="font-size: 20px; font-weight: bold; color: var(--text-heading);">Build Auction</span>
        <button class="close-sidebar-btn" onclick="closeSidebar()">✕</button>
    </div>
    
    <div class="sidebar-content">
        <a href="index.html" class="sidebar-link">Главная</a>
        <a href="create.html" class="sidebar-link active" onclick="requireAuth(event, 'create.html')">Создать лот</a> <a href="messages.html" class="sidebar-link" onclick="requireAuth(event, 'messages.html')">Чат</a>
        <a href="profile.html" class="sidebar-link" onclick="requireAuth(event, 'profile.html')">Мой профиль</a>
        
        <div class="sidebar-divider"></div>
    </div>
</div>

<div id="search-overlay" class="search-overlay" onclick="toggleSearchModal()"></div>
<div id="mangalib-search-modal" class="search-popover-centered">
    <div class="search-input-wrapper">
        <span style="color: var(--text-muted);">🔍</span>
        <input type="text" id="search-input" placeholder="Что ищем?">
        <button onclick="toggleSearchModal()" class="close-search-btn">✖</button>
    </div>
    
    <select id="category-filter" style="display: none;">
        <option value="all">Все</option>
        <option value="electronics">Электроника</option>
        <option value="auto">Авто</option>
        <option value="home">Для дома</option>
        <option value="clothing">Одежда</option>
        <option value="other">Разное</option>
    </select>
    <select id="sort-filter" style="display: none;"><option value="newest"></option></select>
    
    <div class="search-filters">
        <button class="filter-pill active" onclick="setCategory('all', this)">Все категории</button>
        <button class="filter-pill" onclick="setCategory('electronics', this)">Электроника</button>
        <button class="filter-pill" onclick="setCategory('auto', this)">Авто</button>
    </div>

    <div class="search-popular">
        <h4 style="margin: 0 0 10px 0; color: var(--text-muted); font-size: 13px;">Что ищут</h4>
        <div class="popular-tags">
            <span onclick="document.getElementById('search-input').value='Porsche 718';">Porsche 718</span>
            <span onclick="document.getElementById('search-input').value='Изумрудный Тарик';">Изумрудный Тарик</span>
        </div>
    </div>
    
    <button id="search-btn" class="auth-btn-small" style="width: 100%; margin-top: 20px; padding: 12px; font-size: 16px;">Найти</button>
</div>

<div id="auth-modal" style="display: none; position: fixed; z-index: 9999; left: 0; top: 0; width: 100%; height: 100%; background-color: rgba(10, 10, 20, 0.85); backdrop-filter: blur(8px);">
    <div style="background: linear-gradient(145deg, #1e1e30, #141420); color: white; margin: 10% auto; padding: 40px; border-radius: 12px; width: 90%; max-width: 450px; position: relative; box-shadow: 0 15px 40px rgba(0,0,0,0.6); border: 1px solid #2a2a40;">
        <span onclick="closeAuthModal()" style="color: #666; position: absolute; top: 15px; right: 20px; font-size: 28px; font-weight: bold; cursor: pointer; transition: 0.3s;">&times;</span>
        <h2 style="text-align: center; margin-top: 0; color: #fff; font-size: 24px;">ВХОД В СИСТЕМУ</h2>
        <p style="text-align: center; font-size: 14px; color: #888; margin-bottom: 30px;">Пожалуйста, создайте аккаунт или войдите.</p>
        <input type="text" id="username" placeholder="Имя (только для регистрации)" style="background: #11111a; color: white; border: 1px solid #2a2a40; padding: 15px; width: 100%; box-sizing: border-box; margin-bottom: 10px;">
        <input type="email" id="email" placeholder="Email" required style="background: #11111a; color: white; border: 1px solid #2a2a40; padding: 15px; width: 100%; box-sizing: border-box; margin-bottom: 10px;">
        <input type="password" id="password" placeholder="Пароль" required style="background: #11111a; color: white; border: 1px solid #2a2a40; padding: 15px; width: 100%; box-sizing: border-box;">
        <div style="display: flex; gap: 15px; margin-top: 25px;">
            <button onclick="login()" style="flex: 1; background: #4a4e69; padding: 15px; border-radius: 8px; color: white; border: none; cursor: pointer;">ВОЙТИ</button>
            <button onclick="register()" style="flex: 1; background: #5c3c92; padding: 15px; border-radius: 8px; color: white; border: none; cursor: pointer;">СОЗДАТЬ</button>
        </div>
    </div>
</div>

<main class="protected-content" style="display: none; max-width: 1000px; margin: 0 auto;">
    <h2 style="margin-bottom: 25px; color: var(--text-heading);">Создать новый лот</h2>
    
    <div style="display: flex; gap: 40px; flex-wrap: wrap; align-items: flex-start;">
        
        <section class="add-lot-section" style="flex: 1; min-width: 320px; margin: 0;">
            <form id="add-lot-form" style="display: flex; flex-direction: column; gap: 15px;">
                
                <div>
                    <label style="font-weight: 500; font-size: 14px; color: var(--text-muted); display: block; margin-bottom: 5px;">Название лота <span style="color:#e53238">*</span></label>
                    <input type="text" id="title" placeholder="Например: Sony PlayStation 5" maxlength="60" required style="margin: 0;">
                </div>
                
                <div>
                    <label style="font-weight: 500; font-size: 14px; color: var(--text-muted); display: block; margin-bottom: 5px;">Описание</label>
                    <textarea id="description" placeholder="Опишите состояние, комплектацию и особенности..." rows="4" style="margin: 0; resize: vertical;"></textarea>
                </div>
                
                <div style="display: flex; gap: 15px;">
                    <div style="flex: 1;">
                        <label style="font-weight: 500; font-size: 14px; color: var(--text-muted); display: block; margin-bottom: 5px;">Категория <span style="color:#e53238">*</span></label>
                        <select id="category" required style="margin: 0;">
                            <option value="electronics">Электроника</option>
                            <option value="auto">Авто и мото</option>
                            <option value="home">Для дома</option>
                            <option value="clothing">Одежда и обувь</option>
                            <option value="other">Разное</option>
                        </select>
                    </div>
                    <div style="flex: 1;">
                        <label style="font-weight: 500; font-size: 14px; color: var(--text-muted); display: block; margin-bottom: 5px;">Цена (₸) <span style="color:#e53238">*</span></label>
                        <input type="number" id="starting_price" placeholder="Начальная цена (₸)" min="1" required style="margin: 0;">
                        <input type="number" id="buy_now_price" placeholder="Цена «Купить сейчас»">
                    </div>
                </div>

                <div>
                    <label style="font-weight: 500; font-size: 14px; color: var(--text-muted); display: block; margin-bottom: 5px;">Время окончания <span style="color:#e53238">*</span></label>
                    <input type="datetime-local" id="end_time" required style="margin: 0;">
                </div>
                
                <div>
                    <label style="font-weight: 500; font-size: 14px; color: var(--text-muted); display: block; margin-bottom: 5px;">Фотографии</label>
                    <input type="file" id="images" accept="image/*" multiple style="margin: 0; padding: 10px; background: transparent; border: 1px dashed var(--border-color); cursor: pointer;">
                </div>
                
                <button type="submit" class="ebay-search-btn" style="width: 100%; margin-top: 10px; border-radius: 8px;"> Опубликовать лот</button>
            </form>
        </section>

        <section style="flex: 1; min-width: 300px; max-width: 400px;">
            <p style="margin-top: 0; margin-bottom: 10px; color: var(--text-muted); font-size: 14px; font-weight: 500;"> Предпросмотр карточки:</p>
            
            <div class="lot-card" id="preview-card" style="pointer-events: none; border: 2px dashed var(--border-color); box-shadow: none;"> 
                
                <img id="preview-img" src="https://placehold.co/400x300/eeeeee/999999?text=Загрузите+фото" style="width:100%; height: 220px; object-fit: contain; background: var(--input-bg); border-radius: 8px;">
                
                <span id="preview-category" style="display:inline-block; background:var(--input-bg); color:var(--text-muted); padding:3px 8px; border-radius:12px; font-size:12px; font-weight:500; border:1px solid var(--border-color); margin-top:10px; width: fit-content;">
                    Электроника
                </span>
                
                <div style="display: flex; justify-content: space-between; align-items: center; margin-top: 10px;">
                    <h3 id="preview-title" style="margin: 0; font-size: 16px;">Название лота</h3>
                    <button style="background:none; border:none; font-size:24px; padding:0; box-shadow:none;">🤍</button>
                </div>
                
                <div class="price" id="preview-price">₸ 10</div>
                
                <div class="timer" style="color: #e53238; font-weight: bold; margin: 5px 0 15px 0; font-size: 14px;">
                    Осталось: 24ч 00м 00с
                </div>
                
                <div class="bid-controls" style="display: flex; gap: 10px; margin-top: auto;">
                    <input type="number" placeholder="Ставка" disabled style="height:40px; border-radius:20px; padding:0 15px; flex:1; margin:0; border: 1px solid var(--border-color);">
                    <button disabled style="height:40px; border-radius:20px; padding:0 25px; background:var(--ebay-blue); color:white; border:none;">Ставка</button>
                </div>
                
            </div>
        </section>

    </div>
</main>

<div id="toast-container"></div>
<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
<script src="app.js"></script>
</body>
</html>
